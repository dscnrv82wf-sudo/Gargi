<!DOCTYPE html>
<html>
<head>
  <title>For Gargi ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      overflow: hidden;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    button {
      font-size: 20px;
      padding: 14px 30px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      position: absolute;
    }

    #yes {
      background: #ff2e63;
      color: white;
      left: 40%;
      top: 60%;
    }

    #no {
      background: white;
      color: #ff2e63;
      left: 55%;
      top: 60%;
    }
  </style>
</head>

<body>
  <div>
    <h1>💖 Will you be my Valentine, Gargi? 💖</h1>
    <p>— Love, Vikas 💌</p>
  </div>

  <button id="yes"
    onclick="document.body.innerHTML='<h1 style=&quot;color:white&quot;>YAY!!! ❤️🥰</h1><p>You just made me the happiest guy 💕</p>'">
    Yes 💕
  </button>

  <button id="no"
    onmouseover="
      this.style.left = Math.random() * 80 + 'vw';
      this.style.top = Math.random() * 80 + 'vh';
    ">
    No 😜
  </button>

</body>
</html>
